name: Dados Relatório Semanal (segunda)

on:
  schedule:
    - cron: '0 11 * * 1'   # 08h00 Brasília, segunda-feira
  workflow_dispatch:

jobs:
  dados:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Gerar relatórios e enviar ao Telegram
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PASTA_SAIDA: /tmp/relatorios
        run: python src/dados_relatorio_semanal.py
      - name: Guardar JSONs como artifact (backup 30 dias)
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-semanais
          path: /tmp/relatorios/*
          retention-days: 30
